version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simdocfinder-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simdocfinder}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_prod_secret}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: simdocfinder-qdrant-prod
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  embedding-service:
    build: 
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: simdocfinder-embedding-prod
    ports:
      - "5000:5000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: simdocfinder-backend-prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-simdocfinder}
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-admin_prod_secret}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - EMBEDDING_SERVICE_URL=http://embedding-service:5000
      - JWT_SECRET=${JWT_SECRET:-generate_a_secure_random_base64_string_here_for_production}
      - FILE_STORAGE_PATH=/app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      - postgres
      - qdrant
      - embedding-service
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simdocfinder-frontend-prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data_prod:
  qdrant_data_prod:
  backend_uploads_prod:
