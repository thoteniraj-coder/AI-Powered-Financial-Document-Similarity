
services:
  # ──────────────────────────────────────────────
  # PostgreSQL — Relational metadata & audit store
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fdsf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fdsf_db}
      POSTGRES_USER: ${POSTGRES_USER:-fdsf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fdsf_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fdsf_user} -d ${POSTGRES_DB:-fdsf_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Qdrant — Vector database for document embeddings
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fdsf-qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Python Embedding Service — Sentence Transformers
  # ──────────────────────────────────────────────
  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: fdsf-embedding
    ports:
      - "5001:5000"
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s   # Model loading takes time
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Spring Boot Backend — API server
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fdsf-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fdsf_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fdsf_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fdsf_secret_2026}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      EMBEDDING_SERVICE_URL: http://embedding-service:5000
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-2026}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      FILE_STORAGE_PATH: /data/uploads
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # React Frontend — Vite dev / Nginx production
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fdsf-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  upload_data:
    driver: local
