spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/simdocfinder}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}

embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:supersecretkeythatisverylongandsecure}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

file:
  storage-path: ${FILE_STORAGE_PATH:/tmp/simdocfinder/uploads}

chunk:
  size: 800
  overlap: 100
  max-per-doc: 50

malware:
  scan:
    enabled: ${MALWARE_SCAN_ENABLED:false}
    clamav:
      host: ${CLAMAV_HOST:localhost}
      port: ${CLAMAV_PORT:3310}
      timeout-ms: ${CLAMAV_TIMEOUT_MS:10000}

fraud:
  amount-deviation-threshold: ${FRAUD_AMOUNT_DEVIATION_THRESHOLD:0.20}
